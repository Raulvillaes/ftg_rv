reactive_node:
  ros__parameters:
    # ---------- Velocidad ----------
    max_speed: 12.0              # m/s en recta (dirección casi nula)
    mid_speed: 7.0              # m/s en curvas suaves
    corner_speed: 4.0           # m/s en curvas cerradas
    steering_threshold_low: 10.0   # grados: por debajo -> max_speed
    steering_threshold_high: 20.0  # grados: por encima -> corner_speed
    brake_distance: 3.0         # m: con menos espacio libre al frente se va a
                                # corner_speed aunque el volante este recto
    full_speed_distance: 8.0    # m: espacio libre al frente que permite max_speed;
                                # frenar de 10 a 3 m/s toma ~4.8 m en el simulador

    # ---------- Follow the Gap ----------
    fov_angle: 90.0             # grados a cada lado del frente (FOV util = +-90)
    smoothing_window: 5         # rayos de la media movil (suavizado del scan)
    max_range: 10.0             # m: saturacion de distancias del LiDAR
    gap_threshold: 3.0          # m: distancia minima para considerar un rayo "libre"
    bubble_radius: 0.5          # m: radio de la burbuja de seguridad
    best_point_bias: 0.5        # 0.0 = punto mas lejano del gap, 1.0 = centro del gap

# Vueltas y cronometro: nodo aparte (lap_timer_node), suscrito solo a odometria.
lap_timer_node:
  ros__parameters:
    finish_line_tolerance: 4.0  # m: radio alrededor de la posicion inicial (meta);
                                # la linea de carrera puede pasar a ~3 m del spawn
    min_lap_time: 10.0          # s: tiempo minimo entre cruces (anti doble conteo)
    total_laps: 10              # vueltas antes de imprimir la mejor y cerrar el launch
